<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#0f172a" stroke="url(#faviconGrad)" stroke-width="2"/>

  <!-- M Letter -->
  <g transform="translate(45, 45)">
    <text x="55" y="95" font-family="Arial, sans-serif" font-size="110" font-weight="700" fill="url(#faviconGrad)" text-anchor="middle">M</text>
  </g>

  <!-- Accent dot -->
  <circle cx="160" cy="50" r="8" fill="url(#faviconGrad)" opacity="0.8"/>
</svg>