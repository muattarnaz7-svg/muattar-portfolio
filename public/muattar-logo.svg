<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradientMuattar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background (optional - remove for transparent) -->
  <rect width="400" height="400" fill="#0f172a" rx="20"/>

  <!-- Main Logo Container -->
  <g transform="translate(50, 80)">
    <!-- Geometric M mark (triangles) -->
    <g>
      <!-- Left triangle -->
      <polygon points="0,80 20,140 40,80" fill="url(#gradientMuattar)" />
      <!-- Right triangle -->
      <polygon points="60,80 80,140 100,80" fill="url(#gradientMuattar)" />
      <!-- Center accent -->
      <polygon points="40,80 50,110 60,80" fill="url(#gradientAccent)" />
    </g>

    <!-- Text: uttar -->
    <g>
      <text x="140" y="125" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="1">uttar</text>
    </g>
  </g>

  <!-- Logo name below -->
  <text x="200" y="310" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#06b6d4" text-anchor="middle" letter-spacing="2">muattar.dev</text>
</svg>