      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Text Logo -->
  <text x="10" y="55" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="url(#navGrad)" letter-spacing="1.5">MUATTAR</text>
  
  <!-- Subtext -->
  <text x="10" y="72" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#06b6d4" letter-spacing="2" opacity="0.8">DEV</text>

  <!-- Accent line -->
